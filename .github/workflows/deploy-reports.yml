name: Deploy Reports

on:
  push:
    branches: [main]
    paths:
      - complexity-report.csv
      - reports/**/*.py
      - cli/**/*.py
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -e .

      - name: Generate reports
        run: python -m cli.main generate-reports -i complexity-report.csv -o _site

      - name: Password-protect dashboard
        run: npx staticrypt@3 _site/index.html -p "${{ secrets.DASHBOARD_PASSWORD }}" --short --remember 30 -o _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
